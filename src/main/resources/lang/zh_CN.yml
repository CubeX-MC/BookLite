  fail_hold_vanilla: "{prefix}&c请在主手拿着一本未转换的原版成书。"
  fail_hold_booklite: "{prefix}&c请在主手拿着一本 BookLite 空壳书。"
  fail_missing: "{prefix}&c书籍数据缺失，请联系管理员。"
  fail_deleted: "{prefix}&c这本书已被管理员删除。"
  fail_storage: "{prefix}&c数据库操作失败，请查看后台日志。"
  fail_too_many_pages: "{prefix}&c书页过多：&e%actual%&c / 上限 &e%max%&c。"
  fail_page_too_large: "{prefix}&c单页内容过大：&e%actual%&c bytes / 上限 &e%max%&c。"
  fail_book_too_large: "{prefix}&c整本书内容过大：&e%actual%&c bytes / 上限 &e%max%&c。"

status:
