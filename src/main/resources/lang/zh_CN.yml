prefix: "&8[&bBookLite&8] &r"

commands:
  header: "&b&l===== BookLite 命令 ====="
  help_convert: "&e/booklite convert &7- 将手中原版成书转换为空壳书"
  help_restore: "&e/booklite restore &7- 将手中 BookLite 空壳书还原为原版书"
  help_status: "&e/booklite status &7- 查看数据库与缓存状态"
  help_list: "&e/booklite list [页码] &7- 列出数据库书籍"
  help_info: "&e/booklite info <id> &7- 查看单本书详情（支持短 ID）"
  help_read: "&e/booklite read <id> &7- 管理员打开数据库中的书"
  help_delete: "&e/booklite delete <id> &7- 软删除一本书"
  help_undelete: "&e/booklite undelete <id> &7- 撤销软删除"
  help_restorecontainer: "&e/booklite restorecontainer &7- 恢复当前打开容器里的空壳书"
  help_reload: "&e/booklite reload &7- 重新加载配置与语言"
  unknown: "{prefix}&c未知子命令：&f%input%"
